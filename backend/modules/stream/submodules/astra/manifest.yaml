id: astra
parent: stream
name: Cesbo Astra
version: 1.0.0
priority: 60
author: NMS-Team
description: Бэкенд на базе Cesbo Astra для работы с UDP/RTP потоками и HTTP вещанием.
entrypoints:
  factory: backend.modules.stream.submodules.astra:create_backend

capabilities: [streaming, health_check]

# Настройки Astra
config_schema:
  type: object
  properties:
    binary_path:
      type: string
      title: "Путь к Astra"
      group: "Основные"
      default: "astra"
      description: "Системный путь к бинарному файлу astra (например, /usr/bin/astra)"
    http_port:
      type: integer
      title: "HTTP Порт Astra"
      group: "Сеть"
      default: 8000
    keep_active:
      type: boolean
      title: "Keep Active"
      description: "Не закрывать выходной поток при отсутствии входного"
      group: "Основные"
      default: true

formats:
  input_protocols:
    - udp
    - rtp
    - http
  output_types:
    - http
