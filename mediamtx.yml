# Конфигурация MediaMTX (HLS FIX)
logLevel: info
logDestinations: [stdout]

# RTSP
rtsp: true
rtspAddress: :8554
rtpAddress: :8000
rtcpAddress: :8001

# RTMP
rtmp: true
rtmpAddress: :1935

# HLS (ИСПРАВЛЕНО для VLC)
hls: true
hlsAddress: :8888
hlsAlwaysRemux: true
hlsVariant: mpegts
hlsSegmentCount: 7
hlsSegmentDuration: 2s
hlsPartDuration: 200ms
hlsSegmentMaxSize: 50M
hlsMuxerCloseAfter: 60s

# SRT
srt: true
srtAddress: :8890

# Пути
paths:
  all_others:
    source: publisher
    overridePublisher: true
