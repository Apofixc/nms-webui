logLevel: info
logDestinations: [stdout]

# RTSP
rtsp: true
rtspAddress: :8554
rtpAddress: :8500
rtcpAddress: :8501

# RTMP
rtmp: true
rtmpAddress: :1935

# HLS
hls: true
hlsAddress: :8888
hlsAlwaysRemux: true
hlsVariant: mpegts
hlsSegmentCount: 7
hlsSegmentDuration: 2s
hlsPartDuration: 200ms
hlsSegmentMaxSize: 50M
hlsMuxerCloseAfter: 60s

# SRT
srt: true
srtAddress: :8890

# Пути
paths:
  # Основной тестовый поток. MediaMTX автоматически раздаст его по всем протоколам.
  test:
    source: publisher
    # Транскодируем для RTMP/HLS чтобы выровнять таймстампы и GOP.
    runOnInit: >
      sh -c '
      sleep 3;
      ffmpeg -nostdin -re -i http://31.130.202.110/httpts/tv3by/avchigh.ts 
      -c:v libx264 -preset ultrafast -tune zerolatency -g 50 
      -c:a aac -ar 44100 -ab 128k -af "aresample=async=1" 
      -f flv rtmp://localhost:1935/test 
      -c copy -f mpegts udp://239.0.0.1:1234?pkt_size=1316 
      -c copy -f rtp_mpegts rtp://239.0.0.1:1235?pkt_size=1316 
      -c copy -f mpegts -rist_profile simple rist://239.0.0.2:1238
      '
